<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #d4fc79, #96e6a1);
        }

        .container {
            background: white;
            padding: 30px;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            text-align: center;
            font-size: 18px;
            letter-spacing: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Enter OTP</h2>

    <form action="/verify_otp" method="post">
        <input type="text" name="otp" placeholder="Enter OTP" maxlength="6" required>
        <input type="number" name="id" placeholder="Enter Your Id" required>
        <button type="submit">Verify OTP</button>
    </form>
    <h3 font = 'calibri 6'>Your Password Is Send On Your Given Email Address</h1>
</div>

</body>
</html>
