<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Loan | Secure Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b;
            --card-bg: #18181b;
            --accent: #3b82f6;
            --input-bg: #27272a;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 28px;
            border: 1px solid #27272a;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dim);
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: var(--input-bg);
            border: 1px solid #3f3f46;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-submit:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        /* Dashboard Link */
        .btn-back {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
            background: none;
            border: none;
            width: 100%;
        }

        .btn-back:hover {
            color: var(--text-main);
        }

        /* UPI Field Animation */
        #upi_field {
            animation: expand 0.3s ease-out;
        }

        @keyframes expand {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>Loan Request</h2>
        <p class="subtitle">Enter your details to initiate the application</p>

        <form action="/loan" method="POST">
            <div class="input-group">
                <label>Verification ID</label>
                <input type="number" name="id" placeholder="Enter User ID" required>
            </div>

            <div class="input-group">
                <label>Category</label>
                <select name="loan_type">
                    <option value="home">🏠 Home Loan</option>
                    <option value="vehicle">🚗 Vehicle Loan</option>
                    <option value="gold">✨ Gold Loan</option>
                    <option value="land">🌱 Land Loan</option>
                </select>
            </div>

            <div class="input-group" style="display: flex; gap: 15px;">
                <div style="flex: 2;">
                    <label>Amount (₹)</label>
                    <input type="number" name="amount" placeholder="e.g. 50000" required>
                </div>
                <div style="flex: 1;">
                    <label>Months</label>
                    <input type="number" name="duration" placeholder="12" required>
                </div>
            </div>

            <div class="input-group">
                <label>Preferred Payment Mode</label>
                <select name="pay" onchange="showUPI(this.value)">
                    <option value="bank">Bank Transfer</option>
                    <option value="upi">UPI Transfer</option>
                    <option value="wallet">Digital Wallet</option>
                </select>
            </div>

            <div class="input-group" id="upi_container" style="display:none;">
                <label>UPI ID</label>
                <input type="text" id="upi_field" name="upi_id" placeholder="username@bank">
            </div>
            <div class="input-group" id="wallet_container" style="display:none;">
                <label>Wallet Address</label>
                <input type="text" id="wallet_field" name="wallet_address" placeholder="98754565.wallet@Paytm">
            </div>

            <button class="btn-submit" type="submit">SUBMIT APPLICATION</button>
        </form>

        <button class="btn-back" onclick="goto()">← Return to Dashboard</button>
    </div>

    <script>
        function showUPI(value) {
            let upiContainer = document.getElementById("upi_container");
            let upiInput = document.getElementById("upi_field");
            let walletcont = document.getElementById("wallet_container");
            let walletinp = document.getElementById("wallet_field");

            if (value === "upi") {
                upiContainer.style.display = "block";
                upiInput.required = true;
            } else if(value === "wallet") {
                upiContainer.style.display = "none";
                upiInput.required = false;
                walletcont.style.display = "block";
                walletinp.required = true;
            }
            else{
                walletcont.style.display = "none";
                walletinp.required = false;
            }
        }

        function goto() {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
