<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Loan Approval System</title>
    <style>
        /* General Reset */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    /* High-quality nature background */
    background-image: url("https://hectavisionbiosciences.com/wp-content/uploads/2025/07/360_F_673592233_GRdQaHtfPN3t9NvLEn4V7jscQlIQLiUi.jpg");
    background-size: cover;
    background-attachment: fixed;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 50px;
}

/* Glassmorphism Container */
.container {
    background: rgba(255, 255, 255, 0.95);
    padding: 40px;
    border-radius: 16px;
    width: 100%;
    max-width: 850px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

header {
    text-align: center;
    margin-bottom: 30px;
}

h2 {
    color: #168f1e;
    font-size: 2rem;
    margin-bottom: 5px;
}

header p {
    color: #cded1c;
    font-size: 0.9rem;
}

/* Form Grid Layout */
.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* Two equal columns */
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

label {
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 6px;
    color: #333;
}

input[type="text"],
input[type="number"],
input[type="email"] {
    padding: 12px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
    transition: all 0.3s ease;
}

input:focus {
    outline: none;
    border-color: #2e7d32;
    box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.1);
}

/* Radio Button Styling */
.radio-options {
    display: flex;
    gap: 20px;
    height: 45px;
    align-items: center;
}

.radio-item {
    font-weight: normal;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
}

/* Submit Button */
.submit-btn {
    grid-column: span 2; /* Spans across both columns */
    background: #2e7d32;
    color: white;
    padding: 16px;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.3s;
}

.submit-btn:hover {
    background: #1b5e20;
}

/* Responsive Design for Tablets/Phones */
@media (max-width: 768px) {
    .form-grid {
        grid-template-columns: 1fr; /* Switch to one column */
    }
    
    .submit-btn {
        grid-column: span 1;
    }
}
</style>
</head>
<body>

    <div class="container">
        <header>
            <h2>Farmer Loan Portal</h2>
            <p>Please fill in the details accurately for approving process.</p>
        </header>
        
        <form action="/application" method="post">
            <div class="form-grid">
                
                <div class="form-group">
                    <label>Registration ID</label>
                    <input type="number" name="id" placeholder="Eg:3421" required>
                </div>
                
                <div class="form-group">
                    <label>Aadhar Number</label>
                    <input type="number" name="addhar_no" placeholder="12 Digit Number" required>
                    {%if error %}
                    <p>{{error}}</p>
                    {%endif%}
                </div>

                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" name="F_name" placeholder="Enter first name" required>
                </div>

                <div class="form-group">
                    <label>Middle Name</label>
                    <input type="text" name="M_name" placeholder="Enter first name" required>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="L_name" placeholder="Enter last name" required>
                </div>

                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" required>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-options">
                        <label class="radio-item"><input type="radio" name="gender" value="male"> Male</label>
                        <label class="radio-item"><input type="radio" name="gender" value="female"> Female</label>
                        <label class="radio-item"><input type="radio" name="gender" value="other"> Other</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="Email" placeholder="example@mail.com" required>
                </div>

                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="number" name="mobile_no" placeholder="10-digit mobile" required>
                </div>

                <div class="form-group">
                    <label>Village</label>
                    <input type="text" name="Village" required>
                </div>

                <div class="form-group">
                    <label>Taluka</label>
                    <input type="text" name="taluka" required>
                </div>

                <div class="form-group">
                    <label>state</label>
                    <input type="text" name="state" required>
                </div>


                <div class="form-group">
                    <label>District</label>
                    <input type="text" name="district" required>
                </div>

                <div class="form-group">
                    <label>Pincode</label>
                    <input type="number" name="pincode" required>
                </div>

                <div class="form-group">
                    <label>Primary Occupation</label>
                    <h3>FARMER</h3>
                </div>

                <div class="form-group">
                    <label>Annual Income (₹)</label>
                    <input type="number" name="annual_income" placeholder="Total yearly earnings" required>
                </div>

                <button type="submit" class="submit-btn">Submit Application</button>
            </div>
        </form>
    </div>

</body>
</html>
