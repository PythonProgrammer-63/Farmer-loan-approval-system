<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan System | Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            background-color: var(--bg-dark);
            
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.05) 0%, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            opacity: 0.1;
            animation: drift 60s linear infinite;
            z-index: -1;
        }

        @keyframes drift {
            from { transform: translate(-25%, -25%); }
            to { transform: translate(0, 0); }
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: portalScale 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes portalScale {
            0% { transform: scale(0.7); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        h1 {
            color: white;
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 40px;
            opacity: 0.7;
        }

        .portal-btn {
            position: relative;
            display: block;
            width: 100%;
            padding: 30px;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 4px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideIn 0.8s ease forwards;
            opacity: 0;
        }

        .portal-btn:nth-child(2) { animation-delay: 0.3s; }
        .portal-btn:nth-child(3) { animation-delay: 0.5s; }

        @keyframes slideIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* The Scan Line Animation 
        .portal-btn::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, 
                transparent, 
                rgba(99, 102, 241, 0.2), 
                transparent);
            transition: 0.5s;
        }*/

        .portal-btn:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2);
        }

        .portal-btn:hover::after {
            top: 100%;
            transition: 0.5s;
        }

        .admin-btn { border-left: 4px solid var(--primary); }
        .user-btn { border-left: 4px solid #a855f7; }

        .btn-label {
            position: relative;
            z-index: 2;
        }

        /*.pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            margin-right: 15px;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }*/
    </style>
</head>

<body>
    <div class='container'>
        <h1>Gateway</h1>

        <button class='portal-btn admin-btn' onclick="submit()">
            <span class="btn-label"><span class="pulse-dot"></span>ADMIN</span>
        </button>

        <button class='portal-btn user-btn' onclick="submit1()">
            <span class="btn-label">USER</span>
        </button>
    </div>

    <script>
        function submit(){
            // Small exit animation before redirect
            document.querySelector('.container').style.transform = 'scale(1.1)';
            document.querySelector('.container').style.opacity = '0';
            setTimeout(() => { window.location.href='/admin_login'; }, 300);
        }
        function submit1(){
            document.querySelector('.container').style.transform = 'scale(0.9)';
            document.querySelector('.container').style.opacity = '0';
            setTimeout(() => { window.location.href='/login'; }, 300);
        }
    </script>
</body>
</html>
